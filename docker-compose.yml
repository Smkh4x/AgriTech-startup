services:
  postgres:
    image: postgres:18-alpine
    container_name: fala7-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fala7

    ports:
      - "3001:5432"

    volumes:
      - fala7_postgres_data:/var/lib/postgresql/data

volumes:
  fala7_postgres_data: